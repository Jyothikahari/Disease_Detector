name: disease_detection
description: A tomato disease detection app (UI stage)
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (for language switching)
  provider: ^6.1.2

  # For picking images (UI preview only)
  image_picker: ^1.0.0

  # HTTP (keep for later backend usage, optional)
  http: ^0.13.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/